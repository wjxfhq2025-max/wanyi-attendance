        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
            color: white;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        tr:hover {
            background-color: #f5f5f5;
        }
        
        input[type="time"] {
            padding: 8px;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-size: 14px;
            width: 120px;
            text-align: center;
        }
        
        input[type="text"] {
            padding: 8px;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-size: 14px;
            width: 100%;
            text-align: center;
        }
        
        .ranking {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .ranking h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: white;
            margin-bottom: 5px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .chart-container {
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
        }
        
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
    </style>
</head>

        <div id="tabla-container"></div>
        
        <div class="ranking" id="ranking-container"></div>
        
        <div class="chart-container">

        </div>
    </div>

        // Función para inicializar datos al cargar la página
        function inicializarDatos() {
            // Verificar si ya hay datos en localStorage
            const currentData = localStorage.getItem(CURRENT_WEEK_KEY);
            const historialData = localStorage.getItem(HISTORIAL_KEY);
            
            if (!currentData) {
                // Cargar datos de la semana actual desde el archivo del usuario
                localStorage.setItem(CURRENT_WEEK_KEY, JSON.stringify(userData.attendance));
                console.log('✅ Datos de la semana actual cargados');
            }
            
            if (!historialData) {
                // Cargar historial
                localStorage.setItem(HISTORIAL_KEY, JSON.stringify(userData.historial));
                console.log('✅ Historial cargado');
            }
            
            // Cargar la tabla
            cargarTabla();
        }
        
        // Función para cargar la tabla (simplificada)
        function cargarTabla() {
            const container = document.getElementById('tabla-container');
            const data = JSON.parse(localStorage.getItem(CURRENT_WEEK_KEY) || '[]');
            
            let html = '<table><thead><tr><th>Empleado</th><th>Lun</th><th>Mar</th><th>Mié</th><th>Jue</th><th>Vie</th><th>Sáb</th></tr></thead><tbody>';
            
            data.forEach(emp => {
                html += `<tr><td>${emp.nombre}</td>`;
                emp.tiempos.forEach(t => {
                    html += `<td>${t.entrada || '--:--'}<br>${t.salida || '--:--'}</td>`;
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        // Inicializar al cargar
        window.addEventListener('load', inicializarDatos);
    </script>
